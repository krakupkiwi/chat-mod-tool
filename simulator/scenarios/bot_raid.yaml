name: Bot Raid
description: >
  80 organic viewers + coordinated bot network of 50 bots bursting every 3 seconds.
  Bots use 1.0s jitter to partially evade tight-window detection.
  Expected: health score drops below 30 within 8 seconds of raid start.

normal_users:
  count: 80
  msgs_per_minute: 3.0

spam_bots:
  count: 0

bot_networks:
  - bot_count: 50
    burst_interval: 3.0
    jitter_seconds: 1.0
    username_prefix: viewer
